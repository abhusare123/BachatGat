<div class="shell-layout">

  <!-- ── Sidebar (desktop) ── -->
  <nav class="sidebar">
    <div class="group-title">
      <mat-icon class="group-icon">savings</mat-icon>
      <span class="group-name">{{ groupName() }}</span>
    </div>

    <ul class="nav-list">
      <li *ngFor="let item of navItems">
        <a class="nav-item"
           [routerLink]="['/groups', groupId, item.path]"
           routerLinkActive="active">
          <mat-icon>{{ item.icon }}</mat-icon>
          <span class="nav-label">
            <span class="label-mr">{{ item.labelMr }}</span>
            <span class="label-en">{{ item.label }}</span>
          </span>
        </a>
      </li>
    </ul>

    <a class="back-link" (click)="goToAllGroups()">
      <mat-icon>arrow_back</mat-icon>
      <span>All Groups</span>
    </a>
  </nav>

  <!-- ── Page content ── -->
  <main class="shell-content">
    <router-outlet></router-outlet>
  </main>

</div>

<!-- ── Bottom nav (mobile only) ── -->
<nav class="bottom-nav">
  <a class="bottom-nav-item"
     *ngFor="let item of navItems"
     [routerLink]="['/groups', groupId, item.path]"
     routerLinkActive="active">
    <mat-icon>{{ item.icon }}</mat-icon>
    <span>{{ item.labelMr }}</span>
  </a>
  <a class="bottom-nav-item back-item" (click)="goToAllGroups()">
    <mat-icon>arrow_back</mat-icon>
    <span>परत</span>
  </a>
</nav>
