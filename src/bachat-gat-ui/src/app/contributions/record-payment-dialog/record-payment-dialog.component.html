<h2 mat-dialog-title>Record Payment / भरणा नोंदवा</h2>
<mat-dialog-content>
  <p class="member-name"><strong>{{ data.memberName }}</strong></p>
  <div *ngIf="error" class="error-msg">{{ error }}</div>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Period (YYYY-MM)</mat-label>
      <input matInput formControlName="period" placeholder="2026-04">
      <mat-hint>Format: 2026-04</mat-hint>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Amount Paid (₹)</mat-label>
      <input matInput type="number" formControlName="amountPaid">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid || saving" (click)="save()">Save</button>
</mat-dialog-actions>
