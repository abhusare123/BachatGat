<div class="page-container">
  <div class="page-header">
    <h2>{{ 'nav.loans' | translate }}</h2>
    <button mat-flat-button color="primary" (click)="requestLoan()">
      <mat-icon>add</mat-icon> {{ 'buttons.requestLoan' | translate }}
    </button>
  </div>

  <div *ngIf="loading" class="loading-center"><mat-spinner></mat-spinner></div>

  <div *ngIf="!loading" class="loans-list">
    <bg-loan-card
      *ngFor="let loan of loans"
      [loan]="toCardLoan(loan)"
      [isAdmin]="isAdminOrTreasurer"
      [canVote]="canVoteOnLoan(loan)"
      (vote)="vote(loan.id, $event.vote)"
      (approve)="approveLoan($event)"
      (reject)="rejectLoan($event)"
      (disburse)="disburse($event)"
      (close)="closeLoanById($event)"
      (viewRepayments)="goToRepayments($event)"
    />

    <div *ngIf="loans.length === 0" class="empty-state">
      <mat-icon>account_balance_wallet</mat-icon>
      <p>{{ 'messages.noLoansYet' | translate }}</p>
    </div>
  </div>
</div>
