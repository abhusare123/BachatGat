<div class="page-container">
  <div class="page-header">
    <h2>My Groups / माझे गट</h2>
    <button mat-raised-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon> New Group
    </button>
  </div>

  <div *ngIf="loading" class="loading-center"><mat-spinner></mat-spinner></div>

  <div class="groups-grid" *ngIf="!loading">
    <mat-card *ngFor="let g of groups" class="group-card" (click)="openGroup(g.id)">
      <mat-card-header>
        <mat-card-title>{{ g.name }}</mat-card-title>
        <mat-card-subtitle>{{ g.memberCount }} members</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        <p><strong>Monthly:</strong> {{ g.monthlyAmount | currency:'INR':'symbol':'1.0-0' }}</p>
        <p><strong>Interest:</strong> {{ g.interestRatePercent }}% / month</p>
        <p *ngIf="g.description" class="description">{{ g.description }}</p>
      </mat-card-content>
      <mat-card-actions>
        <button mat-button color="primary" (click)="$event.stopPropagation(); openGroup(g.id)">
          <mat-icon>open_in_new</mat-icon> Open
        </button>
      </mat-card-actions>
    </mat-card>

    <div *ngIf="groups.length === 0" class="empty-state">
      <mat-icon>group_off</mat-icon>
      <p>No groups yet. Create one to get started.</p>
    </div>
  </div>
</div>
