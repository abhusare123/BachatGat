<div class="page-container">
  <bg-brand-hero class="page-header" [caption]="'nav.caption' | translate" [compact]="true">
    <span slot="title">{{ 'nav.myGroups' | translate }}</span>
    <button mat-flat-button color="primary" class="hero-action" (click)="openCreate()">
      <mat-icon>add</mat-icon> {{ 'buttons.newGroup' | translate }}
    </button>
  </bg-brand-hero>

  <div *ngIf="loading" class="loading-center"><mat-spinner></mat-spinner></div>

  <div class="groups-grid" *ngIf="!loading">
    <bg-group-card
      *ngFor="let g of groups"
      [group]="toCardGroup(g)"
      (open)="openGroup($event)"
    />

    <div *ngIf="groups.length === 0" class="empty-state">
      <mat-icon>group_off</mat-icon>
      <p>{{ 'messages.noGroupsYet' | translate }}</p>
    </div>
  </div>
</div>
