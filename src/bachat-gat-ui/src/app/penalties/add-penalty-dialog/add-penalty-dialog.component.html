<h2 mat-dialog-title>Add Penalty / दंड नोंदवा</h2>
<mat-dialog-content>
  <div *ngIf="error" class="error-msg">{{ error }}</div>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Member / सदस्य</mat-label>
      <mat-select formControlName="memberId">
        <mat-option *ngFor="let m of members" [value]="m.id">{{ m.fullName }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Amount (₹) / रक्कम</mat-label>
      <input matInput type="number" formControlName="amount" min="0.01">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Purpose / कारण</mat-label>
      <input matInput formControlName="purpose" placeholder="e.g. Late attendance">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date / तारीख</mat-label>
      <input matInput type="date" formControlName="date">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid || saving" (click)="save()">
    Save
  </button>
</mat-dialog-actions>
