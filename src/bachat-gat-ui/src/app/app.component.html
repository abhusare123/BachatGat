<mat-toolbar class="app-navbar" *ngIf="auth.isLoggedIn()">
  <a routerLink="/groups" class="brand">
    <mat-icon>savings</mat-icon>
    <span class="brand-text">बचत गट | Bachat Gat</span>
    <span class="brand-short">बचत गट</span>
  </a>
  <span class="spacer"></span>
  <button mat-icon-button [matMenuTriggerFor]="userMenu" title="Account">
    <mat-icon>account_circle</mat-icon>
  </button>
  <mat-menu #userMenu="matMenu">
    <div class="user-info">{{ auth.currentUser()?.fullName }}</div>
    <div class="user-phone">{{ auth.currentUser()?.phoneNumber }}</div>
    <button mat-menu-item routerLink="/profile">
      <mat-icon>manage_accounts</mat-icon> User Profile
    </button>
    <ng-container *ngIf="currentGroupId">
      <mat-divider></mat-divider>
      <button mat-menu-item [routerLink]="['/groups', currentGroupId, 'members']">
        <mat-icon>group</mat-icon> Members / सदस्य
      </button>
      <button mat-menu-item [routerLink]="['/groups', currentGroupId, 'rules']">
        <mat-icon>gavel</mat-icon> Rules / नियम
      </button>
    </ng-container>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="auth.logout()">
      <mat-icon>logout</mat-icon> Logout
    </button>
  </mat-menu>
</mat-toolbar>

<main class="app-content">
  <router-outlet></router-outlet>
</main>

<footer class="app-footer">
  © {{ currentYear }} All rights reserved by Abhijit Bhusare
</footer>
