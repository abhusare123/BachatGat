<h2 mat-dialog-title>Create New Group / नवीन गट तयार करा</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Group Name</mat-label>
      <input matInput formControlName="name" placeholder="e.g. साम्रसूत गवत गट">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description (optional)</mat-label>
      <textarea matInput formControlName="description" rows="2"></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Monthly Contribution (₹)</mat-label>
      <input matInput type="number" formControlName="monthlyAmount">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Interest Rate (% per month)</mat-label>
      <input matInput type="number" formControlName="interestRatePercent" step="0.5">
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid || saving" (click)="save()">Create</button>
</mat-dialog-actions>
