<div class="page-container">
  <div class="page-header">
    <bg-brand-hero eyebrow="BachatGat" caption="Manage your savings groups and track contributions." [compact]="true">
      <span slot="title">My Groups / माझे गट</span>
    </bg-brand-hero>
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon> New Group
    </button>
  </div>

  <div *ngIf="loading" class="loading-center"><mat-spinner></mat-spinner></div>

  <div class="groups-grid" *ngIf="!loading">
    <bg-group-card
      *ngFor="let g of groups"
      [group]="toCardGroup(g)"
      (open)="openGroup($event)"
    />

    <div *ngIf="groups.length === 0" class="empty-state">
      <mat-icon>group_off</mat-icon>
      <p>No groups yet. Create one to get started.</p>
    </div>
  </div>
</div>
