<div class="login-container">
  <mat-card class="login-card">

    <div class="login-header">
      <mat-icon class="login-logo">savings</mat-icon>
      <h1>बचत गट</h1>
      <p>Enter your registered phone number to sign in</p>
    </div>

    <div class="login-body">
      <div *ngIf="error" class="error-message">{{ error }}</div>

      <form [formGroup]="form" (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Phone Number (10 digits)</mat-label>
          <mat-icon matPrefix>phone</mat-icon>
          <input matInput formControlName="phoneNumber" placeholder="9876543210"
                 maxlength="10" inputmode="numeric" autocomplete="tel">
          <mat-error *ngIf="form.get('phoneNumber')?.hasError('required')">Phone number is required</mat-error>
          <mat-error *ngIf="form.get('phoneNumber')?.hasError('pattern')">Enter a valid 10-digit number</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit"
                [disabled]="loading || form.invalid" class="full-width login-btn">
          <mat-spinner diameter="20" *ngIf="loading"></mat-spinner>
          <mat-icon *ngIf="!loading">login</mat-icon>
          <span *ngIf="!loading">Sign In</span>
        </button>
      </form>

      <p class="not-registered-hint">
        <mat-icon>info_outline</mat-icon>
        Not registered? Ask your group admin to add your number.
      </p>
    </div>

  </mat-card>
</div>
