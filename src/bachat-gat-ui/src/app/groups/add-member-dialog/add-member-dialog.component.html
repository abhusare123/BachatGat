<h2 mat-dialog-title>Add Member / सदस्य जोडा</h2>
<mat-dialog-content>
  <p class="hint">Enter the phone number. If this person has not logged in yet, provide their name to create an account for them.</p>
  <div *ngIf="error" class="error-msg">{{ error }}</div>
  <form [formGroup]="form" class="dialog-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Phone Number (10 digits)</mat-label>
      <input matInput formControlName="phoneNumber" placeholder="9876543210"
             type="tel" maxlength="10" inputmode="numeric"
             (keydown)="allowOnlyDigits($event)">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>User Name (required for new users)</mat-label>
      <input matInput formControlName="fullName" placeholder="e.g. Priya Sharma">
      <mat-hint>Leave blank if the person has already logged in</mat-hint>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Role</mat-label>
      <mat-select formControlName="role">
        <mat-option *ngFor="let r of roles" [value]="r.value">{{ r.label }}</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid || saving" (click)="save()">Add</button>
</mat-dialog-actions>
