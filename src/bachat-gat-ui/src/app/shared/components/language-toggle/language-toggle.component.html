<div class="language-toggle" role="group" aria-label="Language selection">
  <button
    class="toggle-btn"
    [class.active]="currentLanguage() === 'en'"
    (click)="setLanguage('en')"
    aria-pressed="currentLanguage() === 'en'"
    aria-label="Switch to English"
    title="English"
  >
    EN
  </button>
  <button
    class="toggle-btn"
    [class.active]="currentLanguage() === 'mr'"
    (click)="setLanguage('mr')"
    aria-pressed="currentLanguage() === 'mr'"
    aria-label="मराठीमध्ये स्विच करा"
    title="मराठी"
  >
    मराठी
  </button>
</div>
