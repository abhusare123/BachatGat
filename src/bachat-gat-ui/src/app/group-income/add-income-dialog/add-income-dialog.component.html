<h2 mat-dialog-title>{{ 'income.addTitle' | translate }}</h2>
<mat-dialog-content>
  <div *ngIf="error" class="error-msg">{{ error }}</div>
  <form [formGroup]="form" class="dialog-form">

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'tables.category' | translate }}</mat-label>
      <mat-select formControlName="category">
        <mat-option *ngFor="let c of categories" [value]="c.value">{{ c.labelKey | translate }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field *ngIf="isPenalty" appearance="outline" class="full-width">
      <mat-label>{{ 'tables.member' | translate }}</mat-label>
      <mat-select formControlName="groupMemberId">
        <mat-option *ngFor="let m of members" [value]="m.id">{{ m.fullName }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'tables.description' | translate }}</mat-label>
      <input matInput formControlName="description"
             [placeholder]="isPenalty ? 'e.g. Late attendance' : 'e.g. SB account interest'">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'tables.amount' | translate }} (₹)</mat-label>
      <input matInput type="number" formControlName="amount" min="0.01">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>{{ 'tables.date' | translate }}</mat-label>
      <input matInput type="date" formControlName="date">
    </mat-form-field>

  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>{{ 'buttons.cancel' | translate }}</button>
  <button mat-raised-button color="primary" [disabled]="form.invalid || saving" (click)="save()">
    {{ 'buttons.save' | translate }}
  </button>
</mat-dialog-actions>
