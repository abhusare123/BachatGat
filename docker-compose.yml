services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bachatgat_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQL_SA_PASSWORD}"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: >
        /opt/mssql-tools18/bin/sqlcmd
        -S localhost -U sa -P "$$MSSQL_SA_PASSWORD"
        -No -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: src/BachatGat.Api/Dockerfile
    container_name: bachatgat_api
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5002:8080"
    volumes:
      - api_logs:/app/logs
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver,1433;Database=BachatGatDb;User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=True
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "BachatGat"
      Jwt__Audience: "BachatGatUsers"
      Cors__AllowedOrigins__0: "http://localhost:4200"
    restart: unless-stopped

  ui:
    build:
      context: src/bachat-gat-ui
      dockerfile: Dockerfile
    container_name: bachatgat_ui
    depends_on:
      - api
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  sqlserver_data:
    name: bachatgat_sqlserver_data
  api_logs:
    name: bachatgat_api_logs
